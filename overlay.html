<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay</title>
    <link rel="stylesheet" href="assets/css/overlay.css">
</head>

<body>
  <div id="overlay">

    <!-- the bar itself is the progress fill -->
    <div id="bar-fill" class="bar-fill"></div>

    <div class="content">
      <span id="percent" class="percent">0%</span>

      <span class="group">
        <span class="stat">
          <span id="caught">0</span><span class="total">/<span id="total">0</span></span>
        </span>
        <span class="stat shiny"><span class="star">★</span> <span id="shiny">0</span></span>
      </span>

      <span class="title">Living Dex</span>
    </div>

  </div>

  <script type="module" src="assets/js/overlay.js"></script>
</body>
</html>
