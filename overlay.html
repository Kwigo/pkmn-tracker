<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay</title>
    <link rel="stylesheet" href="assets/css/overlay.css">
</head>

<body>
  <div id="overlay">

    <div class="header">
      <span class="title">Living Dex</span>
      <span id="percent" class="percent">0%</span>
    </div>

    <div class="bar">
      <div id="bar-fill" class="bar-fill"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="label">Caught</span>
        <span class="value"><span id="caught">0</span><span class="total"> / <span id="total">0</span></span></span>
      </div>

      <div class="stat shiny">
        <span class="label">Shiny</span>
        <span class="value"><span class="star">★</span> <span id="shiny">0</span></span>
      </div>
    </div>

  </div>

  <script type="module" src="assets/js/overlay.js"></script>
</body>
</html>
