<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwigos Pokémon Tracker</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div id="app">

    <h1 id="title">Pokémon Tracker</h1>

    <div id="tracker">
      <p>Total: 0 / 0</p>
      <p>Caught: 0</p>
      <p>Shiny: 0</p>
      <p>Completion: 0%</p>
    </div>

    <button id="edit-mode">Edit Mode: OFF</button>
    <button id="export-json">Export JSON</button>

    <div id="global-filters">
      <button>All</button>
      <button>Caught</button>
      <button>Not caught</button>
      <button>Shiny</button>
    </div>

    <div id="gens-container"></div>

  </div>

  <button id="collapse-all">Collapse All</button>

  <script src="assets/js/main.js"></script>

</body>
</html>
